<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÈO ADMIN - LỊCH NHẮC NHỞ</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff0f3; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .input-date { width: 30%; display: inline-block; }
        .input-content { width: 68%; display: inline-block; float: right; }
        button { width: 100%; padding: 12px; background: #333; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-family: inherit; }
        button:hover { opacity: 0.9; }
        .list { height: 320px; overflow-y: auto; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #f9f9f9; font-size: 14px; font-weight: bold; }
        .date-badge { color: #fe2c55; margin-right: 10px; }
        .del { color: #fe2c55; cursor: pointer; font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 15px; font-size: 13px; color: #666; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#fe2c55;">⚙️ QUẢN LÝ NGÀY NHẮC NHỞ</h2>
        
        <div style="margin-bottom: 10px; overflow: hidden;">
            <input type="text" id="txtDate" class="input-date" placeholder="Ngày/Tháng (VD: 22/02)">
            <input type="text" id="txtContent" class="input-content" placeholder="Nội dung ghi chú nhắc nhở...">
        </div>
        <button id="btnAdd">THÊM VÀO LỊCH</button>

        <div class="list" id="listContainer">
            <!-- Danh sách tự động tải vào đây -->
        </div>
        
        <a href="/" class="back-link">⬅️ QUAY LẠI TRANG CHỦ LIVE</a>
    </div>

    <script>
        let allReminders = {};

        async function loadReminders() {
            const res = await fetch('/api/reminders');
            allReminders = await res.json();
            renderList();
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            Object.keys(allReminders).sort().forEach(date => {
                const item = document.createElement('div');
                item.className = 'reminder-item';
                item.innerHTML = `
                    <div class="item">
                        <div><span class="date-badge">[Ngày ${date}]</span><span>${allReminders[date]}</span></div>
                        <span class="del" onclick="deleteDate('${date}')">XOÁ</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        document.getElementById('btnAdd').onclick = async () => {
            const date = document.getElementById('txtDate').value.trim();
            const content = document.getElementById('txtContent').value.trim();
            
            if(!/^\d{2}\/\d{2}$/.test(date)) return alert('Vui lòng nhập đúng định dạng Ngày/Tháng (Ví dụ: 25/12 hoặc 22/02)!');
            if(!content) return alert('Vui lòng nhập nội dung ghi chú!');
            
            allReminders[date] = content;
            await saveToServer();
            document.getElementById('txtDate').value = '';
            document.getElementById('txtContent').value = '';
        };

        async function deleteDate(date) {
            if(confirm(`Xóa ghi chú ngày ${date}?`)) {
                delete allReminders[date];
                await saveToServer();
            }
        }

        async function saveToServer() {
            await fetch('/api/reminders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(allReminders)
            });
            renderList();
        }

        loadReminders();
    </script>
</body>
</html>
