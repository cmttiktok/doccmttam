<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - QUẢN LÝ NHẮC NHỞ</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --bg: #fff0f3; --panel: #ffffff; }
        body { font-family: 'Quicksand', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: var(--panel); padding: 20px; border-radius: 20px; border: 2px solid var(--pink); box-shadow: 0 8px 25px rgba(254,44,85,0.1); }
        h2 { color: var(--pink); text-align: center; margin-top: 0; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-family: inherit; font-size: 15px; }
        .input-date { width: 90px; text-align: center; }
        button { padding: 12px 20px; border: none; border-radius: 10px; background: var(--pink); color: white; font-weight: bold; cursor: pointer; font-family: inherit; }
        .reminder-list { display: flex; flex-direction: column; gap: 10px; }
        .reminder-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid var(--pink); }
        .date-badge { font-weight: 700; color: var(--pink); margin-right: 10px; }
        .delete-btn { background: #333; padding: 6px 12px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>⚙️ QUẢN LÝ NGÀY NHẮC NHỞ</h2>
        
        <div class="form-group">
            <input type="text" id="txtDate" class="input-date" placeholder="Ngày/Tháng (VD: 22/02)">
            <input type="text" id="txtContent" placeholder="Nội dung ghi chú nhắc nhở...">
            <button id="btnAdd">LƯU LẠI</button>
        </div>

        <div class="reminder-list" id="listContainer">
            </div>
    </div>

    <script>
        let allReminders = {};

        async function loadReminders() {
            const res = await fetch('/api/reminders');
            allReminders = await res.json();
            renderList();
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';
            
            Object.keys(allReminders).sort().forEach(date => {
                const item = document.createElement('div');
                item.className = 'reminder-item';
                item.innerHTML = `
                    <div><span class="date-badge">[Ngày ${date}]</span> <span>${allReminders[date]}</span></div>
                    <button class="delete-btn" onclick="deleteDate('${date}')">Xóa</button>
                `;
                container.appendChild(item);
            });
        }

        document.getElementById('btnAdd').onclick = async () => {
            const date = document.getElementById('txtDate').value.trim();
            const content = document.getElementById('txtContent').value.trim();
            
            if(!/^\d{2}\/\d{2}$/.test(date)) return alert('Vui lòng nhập đúng định dạng Ngày/Tháng (Ví dụ: 25/12 hoặc 22/02)!');
            if(!content) return alert('Vui lòng nhập nội dung ghi chú!');
            
            allReminders[date] = content;
            await saveToServer();
            document.getElementById('txtDate').value = '';
            document.getElementById('txtContent').value = '';
        };

        async function deleteDate(date) {
            if(confirm(`Xóa ghi chú ngày ${date}?`)) {
                delete allReminders[date];
                await saveToServer();
            }
        }

        async function saveToServer() {
            await fetch('/api/reminders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(allReminders)
            });
            renderList();
        }

        loadReminders();
    </script>
</body>
</html>
