<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO LIVE COMMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --pink: #fe2c55; 
            --bg: #fff0f3; 
            --panel: #ffffff; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Widget Đồng hồ */
        .clock-card {
            background: linear-gradient(135deg, var(--pink), #ff6b8b);
            color: white; padding: 12px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(254,44,85,0.2);
        }
        #digitalClock { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        #digitalDate { font-size: 13px; opacity: 0.9; margin-top: 2px; }

        .card { 
            background: var(--panel); padding: 15px; border-radius: 20px; 
            border: 2px solid var(--pink); box-shadow: 0 6px 20px rgba(254,44,85,0.08);
            text-align: center;
        }
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; background: #f8f9fa;
            font-family: inherit; font-size: 16px; text-align: center; margin-bottom: 12px;
            outline: none;
        }
        
        .btn-main {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--pink); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-main:active { transform: scale(0.98); }
        
        .status-text { font-size: 13px; color: #666; margin-top: 8px; display: block; font-weight: 600; }
        
        /* Thanh điều khiển cỡ chữ */
        .font-control {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; margin-bottom: 12px; background: #fff5f7;
            padding: 8px 12px; border-radius: 10px; border: 1px dashed var(--pink);
        }
        .font-control label { font-size: 13px; color: #555; font-weight: bold; white-space: nowrap; }
        .font-control input[type="range"] { 
            flex: 1; accent-color: var(--pink); cursor: pointer; height: 6px; 
        }
        
        /* Tiêu đề khung chat và nút kích hoạt toàn màn hình */
        .chat-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .chat-title { margin: 0; color: var(--pink); font-size: 15px; }
        .btn-action {
            background: #333; color: white; border: none; padding: 6px 12px;
            font-size: 12px; font-weight: bold; border-radius: 8px; cursor: pointer;
        }
        .btn-close-full {
            background: #fe2c55; color: white; border: none; padding: 8px 16px;
            font-size: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; display: none;
        }
        
        /* Khung chatbox mượt mà */
        .chat-box-wrapper {
            position: relative; width: 100%;
        }
        .chat-box {
            width: 100%; height: calc(100vh - 340px); min-height: 350px; max-height: 550px;
            background: #fff; border-radius: 15px; border: 1px solid #eee;
            padding: 12px; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; gap: 8px; transition: all 0.2s ease-in-out;
        }
        .msg { font-size: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; word-break: break-word; }
        .user { color: var(--pink); font-weight: 700; margin-right: 5px; }
        .txt { color: #333; }
        
        /* ========================================== */
        /* CSS CHẾ ĐỘ TOÀN MÀN HÌNH ẢO CHO MOBILE */
        /* ========================================== */
        body.fullscreen-mode {
            overflow: hidden; padding: 0;
        }
        body.fullscreen-mode .container > *:not(.card-chat-area) {
            display: none !important; /* Ẩn hết đồng hồ và ô kết nối */
        }
        body.fullscreen-mode .container {
            max-width: 100vw; height: 100vh; gap: 0;
        }
        body.fullscreen-mode .card-chat-area {
            border: none !important; border-radius: 0 !important;
            width: 100vw !important; height: 100vh !important;
            padding: 12px !important; display: flex; flex-direction: column;
        }
        body.fullscreen-mode .chat-box {
            flex: 1 !important; height: auto !important; max-height: none !important;
            border-radius: 10px !important; margin-bottom: 5px;
        }
        body.fullscreen-mode .btn-action { display: none; }
        body.fullscreen-mode .btn-close-full { display: block; }
        /* ========================================== */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="clock-card">
            <div id="digitalClock">00:00:00</div>
            <div id="digitalDate">Thứ ..., Ngày --/--/----</div>
        </div>

        <div class="card">
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button class="btn-main" id="btnConnect">KẾT NỐI LIVE</button>
            <span class="status-text" id="status">Chưa kết nối</span>
        </div>

        <div class="card card-chat-area" style="padding: 12px;">
            <div class="chat-header">
                <h3 class="chat-title">💬 BÌNH LUẬN TRỰC TIẾP</h3>
                <button id="btnFullscreen" class="btn-action">📺 TOÀN MÀN HÌNH</button>
                <button id="btnCloseFullscreen" class="btn-close-full">❌ THOÁT TOÀN MÀN HÌNH</button>
            </div>
            
            <div class="font-control">
                <label for="fontSizeSlider">Cỡ chữ: <span id="fontSizeVal">16</span>px</label>
                <input type="range" id="fontSizeSlider" min="14" max="28" value="16">
            </div>

            <div class="chat-box-wrapper">
                <div class="chat-box" id="chatBox"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeVal = document.getElementById('fontSizeVal');
        const btnFullscreen = document.getElementById('btnFullscreen');
        const btnCloseFullscreen = document.getElementById('btnCloseFullscreen');
        
        let currentFontSize = 16;
        let wakeLock = null;

        // 1. Logic Đồng hồ tự động cập nhật
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digitalClock').innerText = `${hours}:${minutes}:${seconds}`;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dayName = days[now.getDay()];
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('digitalDate').innerText = `${dayName}, Ngày ${day}/${month}/${year}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Thanh trượt điều chỉnh kích thước chữ
        fontSizeSlider.oninput = (e) => {
            currentFontSize = e.target.value;
            fontSizeVal.innerText = currentFontSize;
            
            const messages = chatBox.getElementsByClassName('msg');
            for(let msg of messages) {
                msg.style.fontSize = currentFontSize + 'px';
            }
        };

        // 3. Giữ màn hình luôn sáng (Wake Lock API)
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Màn hình đang được giữ sáng chủ động...');
                } catch (err) {
                    console.warn(`WakeLock lỗi: ${err.message}`);
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // 4. Xử lý chế độ Toàn màn hình ảo (Virtual Fullscreen) chuẩn Mobile
        btnFullscreen.onclick = () => {
            document.body.classList.add('fullscreen-mode');
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        btnCloseFullscreen.onclick = () => {
            document.body.classList.remove('fullscreen-mode');
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // 5. Logic Xử lý sự kiện chính
        btnConnect.onclick = async () => {
            const user = usernameInput.value.trim();
            if(!user) return alert('Vui lòng nhập ID!');
            socket.emit('set-username', user);
            await requestWakeLock();
        };

        socket.on('status', (msg) => {
            statusText.innerText = msg;
        });

        socket.on('comment-data', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.style.fontSize = currentFontSize + 'px';
            msgDiv.innerHTML = `<span class="user">${data.user}:</span><span class="txt">${data.comment}</span>`;
            chatBox.appendChild(msgDiv);
            
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
