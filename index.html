<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO LIVE COMMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --pink: #fe2c55; 
            --bg: #fff0f3; 
            --panel: #ffffff; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Widget Đồng hồ mới */
        .clock-card {
            background: linear-gradient(135deg, var(--pink), #ff6b8b);
            color: white; padding: 12px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 15px rgba(254,44,85,0.2);
        }
        #digitalClock { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        #digitalDate { font-size: 13px; opacity: 0.9; margin-top: 2px; }

        .card { 
            background: var(--panel); padding: 15px; border-radius: 20px; 
            border: 2px solid var(--pink); box-shadow: 0 6px 20px rgba(254,44,85,0.08);
            text-align: center;
        }
        input[type="text"] {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; background: #f8f9fa;
            font-family: inherit; font-size: 16px; text-align: center; margin-bottom: 12px;
            outline: none; transition: border 0.2s;
        }
        input[type="text"]:focus { border-color: var(--pink); }
        
        button {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--pink); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        
        .status-text { font-size: 13px; color: #666; margin-top: 8px; display: block; font-weight: 600; }
        
        /* Bộ điều khiển cỡ chữ */
        .font-control {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; margin-bottom: 10px; background: #fff5f7;
            padding: 8px 12px; border-radius: 10px; border: 1px dashed var(--pink);
        }
        .font-control label { font-size: 13px; color: #555; font-weight: bold; white-space: nowrap; }
        .font-control input[type="range"] { 
            flex: 1; accent-color: var(--pink); cursor: pointer; height: 6px; 
        }
        
        /* Hộp chat tối ưu mobile */
        .chat-box {
            width: 100%; height: calc(100vh - 340px); min-height: 350px; max-height: 550px;
            background: #fff; border-radius: 15px; border: 1px solid #eee;
            padding: 12px; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; gap: 8px;
        }
        .msg { font-size: 16px; line-height: 1.4; animation: fadeIn 0.2s ease; word-break: break-word; }
        .user { color: var(--pink); font-weight: 700; margin-right: 5px; }
        .txt { color: #333; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="clock-card">
            <div id="digitalClock">00:00:00</div>
            <div id="digitalDate">Thứ ..., Ngày --/--/----</div>
        </div>

        <div class="card">
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button id="btnConnect">KẾT NỐI LIVE</button>
            <span class="status-text" id="status">Chưa kết nối</span>
        </div>

        <div class="card" style="padding: 12px;">
            <h3 style="margin: 0 0 10px 0; color: var(--pink); font-size: 15px;">💬 BÌNH LUẬN TRỰC TIẾP</h3>
            
            <div class="font-control">
                <label for="fontSizeSlider">Cỡ chữ: <span id="fontSizeVal">16</span>px</label>
                <input type="range" id="fontSizeSlider" min="14" max="28" value="16">
            </div>

            <div class="chat-box" id="chatBox"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        
        // Các thành phần giao diện mới thêm
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeVal = document.getElementById('fontSizeVal');
        let currentFontSize = 16;
        let wakeLock = null;

        // 1. Logic Đồng hồ tự động cập nhật mỗi giây
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digitalClock').innerText = `${hours}:${minutes}:${seconds}`;

            const days = ['Chủ Nhật', 'Thứ Hai', 'Thứ Ba', 'Thứ Tư', 'Thứ Năm', 'Thứ Sáu', 'Thứ Bảy'];
            const dayName = days[now.getDay()];
            const day = String(now.getDate()).padStart(2, '0');
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('digitalDate').innerText = `${dayName}, Ngày ${day}/${month}/${year}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Logic Điều chỉnh kích thước chữ nhanh chóng
        fontSizeSlider.oninput = (e) => {
            currentFontSize = e.target.value;
            fontSizeVal.innerText = currentFontSize;
            
            // Áp dụng trực tiếp lên tất cả các dòng text hiện tại và tương lai trong chatBox
            const messages = chatBox.getElementsByClassName('msg');
            for(let msg of messages) {
                msg.style.fontSize = currentFontSize + 'px';
            }
        };

        // 3. Logic Giữ màn hình luôn sáng (Wake Lock)
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Màn hình đang được giữ sáng chủ động...');
                } catch (err) {
                    console.warn(`Không thể kích hoạt giữ sáng: ${err.message}`);
                }
            }
        }

        // Tự động yêu cầu lại quyền giữ sáng khi quay lại tab (nếu bị mất focus)
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        // 4. Logic Xử lý sự kiện chính (Giữ nguyên gốc)
        btnConnect.onclick = async () => {
            const user = usernameInput.value.trim();
            if(!user) return alert('Vui lòng nhập ID!');
            socket.emit('set-username', user);
            
            // Kích hoạt giữ sáng ngay khi người dùng nhấn tương tác kết nối live
            await requestWakeLock();
        };

        socket.on('status', (msg) => {
            statusText.innerText = msg;
        });

        socket.on('comment-data', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            // Áp dụng ngay kích thước chữ hiện tại đang được chọn trên thanh trượt
            msgDiv.style.fontSize = currentFontSize + 'px';
            msgDiv.innerHTML = `<span class="user">${data.user}:</span><span class="txt">${data.comment}</span>`;
            chatBox.appendChild(msgDiv);
            
            // Tự động cuộn xuống khi có bình luận mới
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
