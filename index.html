<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO LIVE COMMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --pink: #fe2c55; 
            --bg: #fff0f3; 
            --panel: #ffffff; 
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            gap: 15px;
        }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }
        .card { 
            background: var(--panel); padding: 20px; border-radius: 20px; 
            border: 2px solid var(--pink); box-shadow: 0 8px 25px rgba(254,44,85,0.1);
            text-align: center;
            position: relative;
        }
        input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #ddd; background: #f8f9fa;
            font-family: inherit; font-size: 16px; text-align: center; margin-bottom: 12px;
        }
        button {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--pink); color: white; font-weight: bold;
            font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: scale(0.98); }
        .status-text { font-size: 13px; color: #666; margin-top: 8px; display: block; }
        
        /* Cấu trúc tiêu đề khung chat */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .chat-title {
            margin: 0; color: var(--pink); font-size: 16px; font-weight: 700;
        }
        /* Nút bung toàn màn hình nhỏ gọn */
        .btn-fullscreen {
            background: #333; color: white; padding: 6px 12px; 
            font-size: 12px; border-radius: 8px; width: auto; margin: 0;
        }

        .chat-box {
            width: 100%; height: 450px; background: #fff;
            border-radius: 15px; border: 1px solid #eee;
            padding: 15px; overflow-y: auto; text-align: left;
            display: flex; flex-direction: column; gap: 10px;
            transition: all 0.3s ease;
        }
        .msg { font-size: 15px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .user { color: var(--pink); font-weight: 700; margin-right: 5px; }
        .txt { color: #333; }
        
        /* CSS khi kích hoạt chế độ Toàn màn hình tiêu chuẩn trình duyệt */
        .chat-box:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            border-radius: 0px !important;
            padding: 30px !important;
            box-sizing: border-box;
            background: #ffffff !important;
        }
        /* Tăng cỡ chữ khi ở chế độ toàn màn hình để nhìn từ xa rõ hơn */
        .chat-box:fullscreen .msg {
            font-size: 24px !important;
            margin-bottom: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button id="btnConnect">KẾT NỐI LIVE</button>
            <span class="status-text" id="status">Chưa kết nối</span>
        </div>

        <div class="card" style="padding: 15px;">
            <div class="chat-header">
                <h3 class="chat-title">💬 BÌNH LUẬN TRỰC TIẾP</h3>
                <button id="btnFullscreen" class="btn-fullscreen">📺 TOÀN MÀN HÌNH</button>
            </div>
            <div class="chat-box" id="chatBox"></div>
        </div>
    </div>

    <script>
        const socket = io();
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        const btnFullscreen = document.getElementById('btnFullscreen');

        btnConnect.onclick = () => {
            const user = usernameInput.value.trim();
            if(!user) return alert('Vui lòng nhập ID!');
            socket.emit('set-username', user);
        };

        // Xử lý sự kiện bung/thoát chế độ Toàn màn hình
        btnFullscreen.onclick = () => {
            if (!document.fullscreenElement) {
                // Nếu chưa mở, bung khung chatBox lên toàn màn hình
                chatBox.requestFullscreen().catch(err => {
                    alert(`Không thể mở toàn màn hình: ${err.message}`);
                });
            } else {
                // Nếu đang mở, bấm lại sẽ thoát
                document.exitFullscreen();
            }
        };

        // Lắng nghe thay đổi trạng thái fullscreen để đổi chữ trên nút bấm nếu cần
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                btnFullscreen.innerText = "❌ THOÁT";
            } else {
                btnFullscreen.innerText = "📺 TOÀN MÀN HÌNH";
            }
        });

        socket.on('status', (msg) => {
            statusText.innerText = msg;
        });

        socket.on('comment-data', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="user">${data.user}:</span><span class="txt">${data.comment}</span>`;
            chatBox.appendChild(msgDiv);
            
            // Tự động cuộn xuống khi có bình luận mới
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
