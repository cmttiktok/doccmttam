<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÈO LIVE COMMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff0f3; padding: 20px; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 15px; }
        
        /* Widget đồng hồ phong cách phẳng */
        .clock-widget { text-align: center; padding: 10px; background: #fff0f3; border-radius: 12px; border: 1px solid #fdf0f2; }
        .clock-time { font-size: 28px; font-weight: 700; color: #fe2c55; }
        .clock-date { font-size: 13px; color: #666; font-weight: bold; margin-top: 3px; }

        /* Bảng chữ thông báo chạy */
        .marquee-box { background: #333; color: #fff; padding: 10px; border-radius: 10px; overflow: hidden; white-space: nowrap; font-weight: bold; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; font-size: 14px; color: #ffeb3b; }
        @keyframes marquee { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; font-size: 15px; text-align: center; }
        button { width: 100%; padding: 12px; background: #fe2c55; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 5px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .status-text { font-size: 12px; color: #28a745; font-weight: bold; text-align: center; display: block; margin-top: 5px; }
        
        /* Khung hiển thị chat nâng cấp cỡ chữ lớn, giới hạn đúng khoảng 6 dòng */
        .chat-title { color: #fe2c55; font-size: 16px; font-weight: bold; margin: 10px 0 0 0; border-bottom: 1px solid #eee; padding-bottom: 5px; text-align: left; }
        .chat-box { width: 100%; height: 280px; background: #fff; border-radius: 10px; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; }
        .msg { font-size: 18px; line-height: 1.4; animation: fadeIn 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: left; padding: 2px 5px; border-bottom: 1px solid #fdf0f2; }
        .user { color: #fe2c55; font-weight: 700; margin-right: 5px; }
        .txt { color: #333; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .admin-link { color: #666; text-align: center; display: block; font-size: 13px; text-decoration: none; font-weight: bold; margin-top: 5px; }
        .admin-link:hover { color: #fe2c55; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Khu vực Tiện ích Đồng hồ & Thông báo -->
        <div class="clock-widget">
            <div class="clock-time" id="txtTime">00:00:00</div>
            <div class="clock-date" id="txtDate">Đang tải thời gian...</div>
        </div>

        <!-- Bảng chữ chạy -->
        <div class="marquee-box">
            <span class="marquee-text" id="marqueeContent">Đang kiểm tra lịch nhắc nhở...</span>
        </div>
        
        <!-- Khung kết nối -->
        <div>
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button id="btnConnect">KẾT NỐI LIVE</button>
            <span class="status-text" id="status">Chưa kết nối</span>
        </div>

        <!-- Khung hiển thị bình luận mẫu cũ -->
        <div>
            <div class="chat-title">💬 BÌNH LUẬN TRỰC TIẾP</div>
            <div class="chat-box" id="chatBox"></div>
        </div>

        <a href="/admin" class="admin-link">⚙️ CÀI ĐẶT NGÀY NHẮC NHỞ</a>
    </div>

    <script>
        const socket = io();
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');

        const defaultWishes = [
            "Chúc Bé Chi có một buổi livestream tràn ngập niềm vui và ngập tràn quà tặng! ✨",
            "Chúc phòng live luôn rực rỡ, mọi người tương tác thật vui vẻ nhé! 💕",
            "Ngày mới tràn đầy năng lượng và luôn cười thật tươi nha idol! 🌸",
            "Chúc vạn sự hanh thông, live mượt mà, người xem tăng vùn vụt! 🚀"
        ];

        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        async function checkReminders(currentDateStr) {
            try {
                const res = await fetch('/api/reminders');
                const reminders = await res.json();
                const marqueeEl = document.getElementById('marqueeContent');
                
                if (reminders[currentDateStr]) {
                    marqueeEl.innerHTML = `📢 NHẮC NHỞ HÔM NAY: ${reminders[currentDateStr]} 🔥🔥🔥`;
                    marqueeEl.style.color = "#ffeb3b";
                } else {
                    const randomWish = defaultWishes[Math.floor(Math.random() * defaultWishes.length)];
                    marqueeEl.innerHTML = `🌟 ${randomWish}`;
                    marqueeEl.style.color = "#00ffcc";
                }
            } catch (e) {
                document.getElementById('marqueeContent').innerText = "Chúc buổi live stream diễn ra tốt đẹp! ❤️";
            }
        }

        let lastCheckedDate = "";
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('txtTime').innerText = `${hours}:${minutes}:${seconds}`;
            
            const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
            let dayStr = String(now.getDate()).padStart(2, '0');
            let monthStr = String(now.getMonth() + 1).padStart(2, '0');
            let currentDateStr = `${dayStr}/${monthStr}`;
            
            if (currentDateStr !== lastCheckedDate) {
                lastCheckedDate = currentDateStr;
                document.getElementById('txtDate').innerText = `${daysOfWeek[now.getDay()]} - Ngày ${dayStr}/${monthStr}/${now.getFullYear()}`;
                checkReminders(currentDateStr);
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        btnConnect.addEventListener('click', () => {
            const user = usernameInput.value.trim();
            if(!user) return alert('Vui lòng nhập ID!');
            socket.emit('set-username', user);
            requestWakeLock();
        });

        socket.on('status', (msg) => { 
            statusText.innerText = msg; 
            if(msg.includes("thành công")) {
                btnConnect.innerText = "ĐÃ KẾT NỐI THÀNH CÔNG";
                btnConnect.style.background = "#28a745";
            }
        });

        socket.on('comment-data', (data) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.innerHTML = `<span class="user">${data.user}:</span><span class="txt">${data.comment}</span>`;
            chatBox.appendChild(msgDiv);
            
            while (chatBox.children.length > 6) {
                chatBox.removeChild(chatBox.firstChild);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
