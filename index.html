<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO LIVE PANEL - ĐỌC CMT 12 DÒNG</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink: #fe2c55; 
            --bg: #fff0f3; 
            --panel: #ffffff; 
        }
        * { box-sizing: border-box; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
            gap: 15px;
        }

        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

        .card { 
            background: var(--panel); padding: 20px; border-radius: 20px; 
            border: 2px solid var(--pink); box-shadow: 0 8px 25px rgba(254,44,85,0.08); 
            text-align: center;
        }

        .clock-widget {
            background: linear-gradient(135deg, #fff0f3 0%, #ffffff 100%);
            border-radius: 15px; padding: 10px; margin-bottom: 10px; border: 1px dashed var(--pink);
        }
        .clock-time { font-size: 26px; font-weight: 700; color: var(--pink); }
        .clock-date { font-size: 13px; color: #444; font-weight: 600; }

        input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;
            background: #f8f9fa; font-family: inherit; font-size: 16px; text-align: center; margin-bottom: 10px;
        }
        
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: var(--pink); color: white; font-weight: bold; font-size: 16px; 
            cursor: pointer;
        }

        .status-text { font-size: 13px; color: #28a745; font-weight: bold; margin-top: 6px; display: block; }

        .chat-container-title {
            margin: 0 0 10px 0; color: var(--pink); font-size: 16px; font-weight: bold; text-align: left;
        }
        
        .chat-box {
            width: 100%; 
            height: 480px; 
            background: #fff; border-radius: 15px; border: 1px solid #eee;
            padding: 10px; overflow-y: auto; 
            display: flex; flex-direction: column; justify-content: flex-start; gap: 6px;
        }

        .msg { 
            font-size: 18px; 
            line-height: 1.5; 
            padding: 8px 12px; 
            border-radius: 10px;
            animation: fadeIn 0.25s ease; 
            white-space: normal; 
            word-break: break-word; 
            text-align: left; 
        }
        .msg:nth-child(even) { background-color: #fff0f3; } 
        .msg:nth-child(odd) { background-color: #ffffff; }  
        
        .user { color: var(--pink); font-weight: 700; margin-right: 6px; display: inline; }
        .txt { color: #222; font-weight: 600; display: inline; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* CHẾ ĐỘ TOÀN MÀN HÌNH */
        body.fullscreen-mode { padding: 0; background: #ffffff; }
        body.fullscreen-mode .container { max-width: 100%; gap: 0; height: 100vh; }
        body.fullscreen-mode .card-control { display: none !important; }
        body.fullscreen-mode .card-chat { border: none; border-radius: 0; box-shadow: none; padding: 5px; height: 100vh; }
        body.fullscreen-mode .chat-box { height: calc(100vh - 60px); border: none; padding: 5px; }
        
        .admin-link { color: #666; text-align: center; display: block; font-size: 13px; text-decoration: none; font-weight: bold; margin-top: 5px; }
        
        /* Bộ điều khiển âm thanh ẩn phụ trợ từ bản cũ của bạn */
        .audio-settings { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card card-control">
            <div class="clock-widget">
                <div class="clock-time" id="txtTime">00:00:00</div>
                <div class="clock-date" id="txtDate">Đang tải...</div>
            </div>
            
            <input type="text" id="username" value="chipham1" placeholder="Nhập tên tài khoản TikTok Live">
            <button id="btnConnect" class="btn">KẾT NỐI LIVE</button>
            <span class="status-text" id="status">Chưa kết nối</span>
        </div>

        <div class="card card-chat">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h3 class="chat-container-title" style="margin:0;">💬 BÌNH LUẬN TRỰC TIẾP (12 DÒNG)</h3>
                <button id="btnToggleFS" style="width:auto; padding: 6px 12px; margin:0; font-size:12px;" class="btn">TOÀN MÀN HÌNH</button>
            </div>
            <div class="chat-box" id="chatBox"></div>
        </div>

        <a href="/admin" class="admin-link card-control">⚙️ QUẢN TRỊ HỆ THỐNG</a>
    </div>

    <div class="audio-settings">
        <input type="checkbox" id="masterMute">
        <input type="checkbox" id="welcomeToggle">
        <input type="checkbox" id="giftToggle">
        <input type="checkbox" id="pkToggle">
        <input type="checkbox" id="botToggle">
        <input type="text" id="speechSpeed" value="1.0">
        <input type="text" id="masterVolume" value="1.0">
    </div>

    <script>
        const socket = io();
        const btnConnect = document.getElementById('btnConnect');
        const usernameInput = document.getElementById('username');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        const btnToggleFS = document.getElementById('btnToggleFS');

        let queue = [];
        let playing = false;
        let wakeLock = null;

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        btnToggleFS.onclick = () => {
            document.body.classList.toggle('fullscreen-mode');
            if(document.body.classList.contains('fullscreen-mode')) {
                btnToggleFS.innerText = "THOÁT TOÀN MÀN HÌNH";
                btnToggleFS.style.background = "#333";
            } else {
                btnToggleFS.innerText = "TOÀN MÀN HÌNH";
                btnToggleFS.style.background = "#fe2c55";
            }
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('txtTime').innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            
            const daysOfWeek = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];
            let currentDateStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}`;
            document.getElementById('txtDate').innerText = `${daysOfWeek[now.getDay()]}, Ngày ${currentDateStr}/${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        btnConnect.onclick = () => {
            const user = usernameInput.value.trim();
            if(!user) return alert('Vui lòng nhập ID!');
            socket.emit('set-username', user);
            requestWakeLock();
        };

        socket.on('status', (msg) => { statusText.innerText = msg; });

        // Nhận và phát dữ liệu âm thanh + Đẩy cmt lên màn hình chính xác
        socket.on('audio-data', (d) => {
            if (d.user && d.comment) {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg';
                msgDiv.innerHTML = `<span class="user">${d.user}:</span><span class="txt">${d.comment}</span>`;
                chatBox.appendChild(msgDiv);
                
                while (chatBox.children.length > 12) {
                    chatBox.removeChild(chatBox.firstChild);
                }
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            // Logic phát âm thanh Google TTS gốc của bạn
            if (d.audio) {
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = 1.0;
            a.volume = 1.0;
            a.onended = () => setTimeout(play, 300);
            a.play().catch(() => play());
        }
    </script>
</body>
</html>
